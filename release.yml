name: Release Sudolex

on:
  push:
    tags:
      - 'v*'   # Déclenché sur chaque tag v1.0.0, v1.1.0, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v1
        with:
          name: Sudolex ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            main.py
            requirements.txt
            install.bat
            run.bat
            install.sh
            run.sh
            sudolex_logo_white.png
            sudolex_logo_black.png
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
